<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toda Bella Studio</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:#ffffff;
color:#4a4a4a;
padding-bottom:90px;
}

header{
text-align:center;
padding:40px 20px 30px;
}

.logo{
width:180px;
max-width:80%;
margin-bottom:20px;
}

header h1{
font-size:2rem;
color:#b76e79;
margin-bottom:10px;
}

header p{
color:#777;
font-size:1rem;
}

.container{
max-width:500px;
margin:auto;
padding:0 20px 30px;
}

.instagram{
display:block;
width:100%;
background:#b76e79;
color:white;
text-decoration:none;
padding:18px;
border-radius:20px;
text-align:center;
font-size:18px;
font-weight:bold;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(183,110,121,.25);
transition:.3s;
}

.instagram:hover{
transform:translateY(-3px);
}

.info-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.card{
background:white;
border-radius:20px;
padding:25px 20px;
text-align:center;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.card .icone{
font-size:32px;
margin-bottom:12px;
}

.card h3{
color:#b76e79;
margin-bottom:10px;
font-size:18px;
}

.card p{
color:#666;
font-size:15px;
line-height:1.6;
}

.menu{
position:fixed;
bottom:0;
left:0;
width:100%;
background:white;
display:flex;
justify-content:space-around;
padding:15px 10px;
box-shadow:0 -5px 20px rgba(0,0,0,.1);
}

.menu a{
text-decoration:none;
color:#b76e79;
font-size:14px;
font-weight:600;
display:flex;
flex-direction:column;
align-items:center;
gap:5px;
}

.menu span{
font-size:24px;
}

@media(max-width:768px){

.logo{
width:150px;
}

header h1{
font-size:1.8rem;
}

.info-grid{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<img
src="logo-todabella.png"
alt="Toda Bella Studio"
class="logo">

<h1>Toda Bella Studio</h1>

<p>
Transformando autoestima em beleza.
</p>

</header>

<div class="container">

<a
href="https://www.instagram.com/todabellastudio2026/"
target="_blank"
class="instagram">

📷 Siga no Instagram

</a>

<div class="info-grid">

<div class="card">

<div class="icone">
🕒
</div>

<h3>Atendimento</h3>

<p>
Terça à Sábado<br>
09:30 às 17:00
</p>

</div>

<div class="card">

<div class="icone">
📍
</div>

<h3>Endereço</h3>

<p>
Ferraz de Vasconcelos<br>
São Paulo
</p>

</div>

</div>

</div>

</body>
</html>
