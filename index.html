<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Toda Bella Studio</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="app">



<div id="home" class="tela">


<header class="header">


<div class="perfil">

<img src="logo.png">

</div>


<div>

<h1>Toda Bella</h1>

<p>Studio de Beleza ✨</p>

</div>


</header>





<div class="busca">

🔍 Buscar serviço

</div>






<div class="banner">

<h2>

Olá 👋

</h2>


<h1>

Seu momento de beleza

</h1>


<p>

Agende seu horário online

</p>


<button onclick="abrirAgendamento()">

Agendar agora

</button>


</div>







<h2>Serviços</h2>




<div class="cards">



<div class="servico"
onclick="abrirAgendamento('Manicure')">

💅

<h3>Manicure</h3>

<p>60 min</p>

</div>





<div class="servico"
onclick="abrirAgendamento('Corte Feminino')">


💇


<h3>Corte</h3>

<p>45 min</p>


</div>





<div class="servico"
onclick="abrirAgendamento('Escova')">


✨


<h3>Escova</h3>

<p>40 min</p>


</div>



</div>






<nav>

<button>⌂</button>

<button onclick="abrirAgendamento()">📅</button>

<button>♡</button>

<button>👤</button>

</nav>




</div>









<div id="agenda" class="tela escondida">



<header class="top">


<button onclick="voltar()">

←

</button>


<h2>

Agendamento

</h2>


</header>





<h3 id="tituloServico">

Escolha o serviço

</h3>







<div class="calendario">


<h2>

Escolha o dia

</h2>



<div class="dias">


<button onclick="dia(this,'Terça')">

Ter

</button>



<button onclick="dia(this,'Quarta')">

Qua

</button>



<button onclick="dia(this,'Quinta')">

Qui

</button>



<button onclick="dia(this,'Sexta')">

Sex

</button>



<button onclick="dia(this,'Sábado')">

Sáb

</button>



</div>


</div>








<div class="periodo">



<h3>

Manhã ☀️

</h3>



<div class="horarios">


<button onclick="hora(this,'09:30')">

09:30

</button>



<button onclick="hora(this,'10:30')">

10:30

</button>



<button onclick="hora(this,'11:30')">

11:30

</button>



</div>






<h3>

Tarde 🌙

</h3>





<div class="horarios">


<button onclick="hora(this,'13:30')">

13:30

</button>


<button onclick="hora(this,'14:30')">

14:30

</button>


<button onclick="hora(this,'15:30')">

15:30

</button>


<button onclick="hora(this,'16:30')">

16:30

</button>


</div>


</div>








<div class="confirm">



<p id="resumo">

Selecione serviço

</p>




<input id="nome"
placeholder="Seu nome">



<input id="whatsapp"
placeholder="WhatsApp">



<button onclick="confirmar()">

Confirmar agendamento

</button>



</div>




</div>





</div>





<script src="script.js"></script>


</body>

</html>
