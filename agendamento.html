<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento - Toda Bella Studio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="voltar-container">

<a href="index.html" class="btn-voltar">

⬅ Voltar ao Menu Principal

</a>

</div>

<header>

<img
src="logo-todabella.png"
alt="Toda Bella Studio"
class="logo">

<h1>Toda Bella Studio</h1>

<p>Reserve seu momento de beleza com conforto e praticidade.</p>

</header>

<div class="container">

<div class="card">

<div class="boas-vindas">

<h2>✨ Novo Agendamento ✨</h2>

<p>
Escolha o serviço desejado e selecione o melhor horário para você.
</p>

</div>

<form id="agendamentoForm">

<label for="nome">
👤 Nome Completo
</label>

<input
type="text"
id="nome"
placeholder="Digite seu nome"
required>

<label for="telefone">
📞 Telefone
</label>

<input
type="tel"
id="telefone"
placeholder="(11) 99999-9999"
required>

<label for="servico">
💇 Serviço
</label>

<select
id="servico"
required>

<option value="">
Selecione um serviço
</option>

<option>
Progressiva - R$120,00
</option>

<option>
Botox Capilar - R$99,00
</option>

<option>
Cronograma Capilar - R$99,00
</option>

<option>
Escova - R$50,00
</option>

<option>
Selagem - R$79,99
</option>

<option>
Tratamento Capilar - R$69,99
</option>

</select>

<label for="data">
📅 Data
</label>

<input
type="date"
id="data"
required>

<label for="horario">
⏰ Horário
</label>

<select
id="horario"
required>

<option value="">
Selecione uma data primeiro
</option>

</select>

<button
class="btn"
type="submit">

🌸 Confirmar Agendamento

</button>

</form>

</div>

</div>

<footer>

<p>
Toda Bella Studio © 2026
</p>

<p>
Transformando autoestima em beleza.
</p>

</footer>

<script type="module" src="app.js"></script>

</body>
</html>
