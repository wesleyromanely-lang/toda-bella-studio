<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Agendamento - Toda Bella Studio</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div style="text-align:center; margin-top:20px;">

<a href="index.html" class="voltar">

⬅ Voltar ao Menu Principal

</a>

</div>



<header>

<h1>Toda Bella Studio</h1>

<p>Agende seu horário online</p>

</header>



<div class="container">


<div class="card">


<h2>Novo Agendamento</h2>


<form id="agendamentoForm">



<label>
Nome
</label>

<input
type="text"
id="nome"
placeholder="Digite seu nome"
required>



<label>
Telefone
</label>

<input
type="tel"
id="telefone"
placeholder="(11) 99999-9999"
required>




<label>
Serviço
</label>


<select id="servico" required>


<option value="">
Selecione o serviço
</option>


<option>
Progressiva - R$120,00
</option>


<option>
Botox Capilar - R$99,00
</option>


<option>
Cronograma Capilar - R$99,00
</option>


<option>
Escova - R$50,00
</option>


<option>
Selagem - R$79,99
</option>


<option>
Tratamento Capilar - R$69,99
</option>


</select>




<label>
Data
</label>


<input
type="date"
id="data"
required>




<label>
Horário
</label>


<select id="horario" required>


<option value="">
Selecione uma data primeiro
</option>


</select>




<button
class="btn"
type="submit">

Confirmar Agendamento

</button>



</form>


</div>


</div>




<footer>

<p>
© Toda Bella Studio
</p>

</footer>




<script
type="module"
src="app.js">

</script>


</body>

</html>
