<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agendamento - Toda Bella Studio</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>Toda Bella Studio</h1>
    <p>Agende seu horário online</p>
</header>

<div class="container">

    <div class="card">

        <h2>Novo Agendamento</h2>

        <form id="agendamentoForm">

            <label>Nome</label>
            <input type="text" id="nome" required>

            <label>Telefone</label>
            <input type="tel" id="telefone" required>

            <label>Serviço</label>
            <select id="servico" required>
                <option value="">Selecione</option>
                <option>Progressiva - R$120,00</option>
                <option>Botox Capilar - R$99,00</option>
                <option>Cronograma Capilar - R$99,00</option>
                <option>Escova - R$50,00</option>
                <option>Selagem - R$79,99</option>
                <option>Tratamento Capilar - R$69,99</option>
            </select>

            <label>Data</label>
            <input type="date" id="data" required>

            <label>Horário</label>
            <select id="horario" required>
                <option>09:30</option>
                <option>10:30</option>
                <option>11:30</option>
                <option>12:30</option>
                <option>13:30</option>
                <option>14:30</option>
                <option>15:30</option>
                <option>16:30</option>
            </select>

            <button class="btn" type="submit">
                Confirmar Agendamento
            </button>

        </form>

    </div>

</div>

<footer>
    © Toda Bella Studio
</footer>

</body>
</html>
