<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Horários - Toda Bella Studio</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<header>

<img
src="logo-todabella.png"
class="logo"
alt="Toda Bella Studio">


<h1>
Horários Disponíveis
</h1>


</header>



<div class="container">


<div class="card">


<label>
Selecione a data
</label>


<input
type="date"
id="data">



<div id="listaHorarios">

<p>
Escolha uma data para consultar.
</p>


</div>


</div>


</div>




<nav class="menu">


<a href="index.html">

<span>🏠</span>

Início

</a>



<a href="agendamento.html">

<span>📅</span>

Agendar

</a>



<a href="horarios.html">

<span>🕒</span>

Horários

</a>


</nav>




<script type="module">


import {
db,
ref,
get,
child
} from "./firebase.js";



const horariosFixos = [

"09:30",
"10:30",
"11:30",
"12:30",
"13:30",
"14:30",
"15:30",
"16:30"

];




function bloqueado(data){

const dia =
new Date(data+"T00:00:00").getDay();

return dia === 0 || dia === 1;

}




document
.getElementById("data")
.addEventListener(
"change",
carregarHorarios
);





async function carregarHorarios(){


const data =
document.getElementById("data").value;


const lista =
document.getElementById("listaHorarios");



lista.innerHTML = "";



if(!data){

return;

}




if(bloqueado(data)){


lista.innerHTML =
"<p>Fechado aos domingos e segundas.</p>";


return;


}




const snapshot =
await get(
child(ref(db),"agendamentos")
);



let ocupados = [];



if(snapshot.exists()){


const dados =
snapshot.val();



Object.values(dados).forEach(item=>{


if(item.data === data){

ocupados.push(item.horario);

}


});


}





horariosFixos.forEach(horario=>{


const div =
document.createElement("div");



div.className =
"horario";



if(ocupados.includes(horario)){


div.classList.add("ocupado");


div.innerHTML =
"🔴 "+horario+" - Ocupado";


}else{


div.classList.add("livre");


div.innerHTML =
"🟢 "+horario+" - Disponível";


}



lista.appendChild(div);



});



}


</script>



</body>

</html>
