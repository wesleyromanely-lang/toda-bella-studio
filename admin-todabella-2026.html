<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo - Toda Bella Studio</title>

<style>

body{
font-family:Arial,sans-serif;
background:#fff5f8;
padding:20px;
margin:0;
}

.login{
max-width:400px;
margin:50px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

.login h2{
text-align:center;
color:#c97b95;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#c97b95;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

button:hover{
opacity:.9;
}

#painel{
display:none;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.08);
text-align:center;
}

.box h3{
margin:0;
color:#c97b95;
}

.card{
background:white;
padding:20px;
margin-top:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.08);
}

.card h3{
margin-top:0;
color:#c97b95;
}

.whatsapp{
background:#25D366;
margin-top:10px;
}

.excluir{
background:#e53935;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login" id="login">

<h2>🔒 Área Administrativa</h2>

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="entrar()">
Entrar
</button>

</div>

<div id="painel">

<h1>Toda Bella Studio</h1>

<div class="dashboard">

<div class="box">
<h3 id="total">
📅 Agendamentos: 0
</h3>
</div>

<div class="box">
<h3 id="faturamento">
💰 Faturamento: R$ 0,00
</h3>
</div>

</div>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar cliente">

<button onclick="pesquisarCliente()">
🔍 Pesquisar
</button>

<div id="lista"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
