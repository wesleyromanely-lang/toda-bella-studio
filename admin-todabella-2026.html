<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo - Toda Bella Studio</title>

<style>

body{
font-family:Arial,sans-serif;
background:#fff5f8;
padding:20px;
margin:0;
}

.login{
max-width:400px;
margin:50px auto;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,0,0,.1);
}

.login h2{
text-align:center;
color:#c97b95;
}

.logo{
display:block;
margin:0 auto 20px;
width:180px;
max-width:80%;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ddd;
border-radius:10px;
box-sizing:border-box;
}

button{
width:100%;
padding:12px;
background:#c97b95;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
margin-top:5px;
}

button:hover{
opacity:.9;
}

#painel{
display:none;
}

.dashboard{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
margin-bottom:20px;
}

.box{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.08);
text-align:center;
}

.card{
background:white;
padding:20px;
margin-top:15px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.08);
}

.whatsapp{
background:#25D366;
}

.confirmar{
background:#2196F3;
}

.excluir{
background:#e53935;
}

#agendaVisual,
#relatorioMensal,
#calendarioMensal{
background:white;
padding:20px;
border-radius:15px;
margin-top:20px;
box-shadow:0 0 10px rgba(0,0,0,.08);
}

.livre{
background:#e8f5e9;
padding:10px;
border-radius:10px;
margin:5px 0;
}

.ocupado{
background:#ffebee;
padding:10px;
border-radius:10px;
margin:5px 0;
}

h1{
text-align:center;
color:#c97b95;
margin-bottom:20px;
}

.calendario-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(80px,1fr));
gap:10px;
margin-top:15px;
}

.dia-calendario{
padding:15px;
border-radius:12px;
text-align:center;
font-weight:bold;
cursor:pointer;
}

.dia-livre{
background:#e8f5e9;
}

.dia-parcial{
background:#fff8e1;
}

.dia-lotado{
background:#ffebee;
}

@media(max-width:768px){

.logo{
width:140px;
}

}

</style>

</head>

<body>

<div class="login" id="login">

<img
src="logo-todabella.png"
alt="Toda Bella Studio"
class="logo">

<h2>🔒 Área Administrativa</h2>

<input
type="password"
id="senha"
placeholder="Digite sua senha">

<button onclick="entrar()">
Entrar
</button>

</div>

<div id="painel">

<img
src="logo-todabella.png"
alt="Toda Bella Studio"
class="logo">

<h1>Toda Bella Studio</h1>

<div class="dashboard">

<div class="box">
<h3 id="hoje">📅 Hoje: 0</h3>
</div>

<div class="box">
<h3 id="amanha">📅 Amanhã: 0</h3>
</div>

<div class="box">
<h3 id="faturamentoHoje">💰 Hoje: R$ 0,00</h3>
</div>

<div class="box">
<h3 id="faturamento">💰 Total: R$ 0,00</h3>
</div>

</div>

<div id="relatorioMensal">

<h2>📊 Relatório Mensal</h2>

<p id="clientesMes">👩 Clientes: 0</p>

<p id="faturamentoMes">💰 Faturamento Mensal: R$ 0,00</p>

<p id="servicoMaisVendido">⭐ Serviço Mais Vendido: -</p>

</div>

<div id="calendarioMensal">

<h2>📅 Calendário Mensal</h2>

<p>
🟢 Livre • 🟡 Parcial • 🔴 Lotado
</p>

<div id="calendario" class="calendario-grid"></div>

</div>

<input
type="text"
id="pesquisa"
placeholder="Pesquisar cliente">

<button onclick="pesquisarCliente()">
🔍 Pesquisar
</button>

<div id="lista"></div>

<div id="agendaVisual">

<h2>📅 Agenda por Data</h2>

<input
type="date"
id="dataAgenda">

<button onclick="mostrarAgendaData()">
Consultar Agenda
</button>

<div id="agenda"></div>

</div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
