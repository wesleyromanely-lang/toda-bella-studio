<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Painel Administrativo</title>

<style>

body{
font-family:Arial,sans-serif;
background:#fff5f8;
padding:20px;
}

.login{
max-width:400px;
margin:50px auto;
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:12px;
margin:10px 0;
}

button{
width:100%;
padding:12px;
background:#c97b95;
color:white;
border:none;
border-radius:10px;
cursor:pointer;
}

#painel{
display:none;
}

.card{
background:white;
padding:15px;
margin:10px 0;
border-radius:15px;
box-shadow:0 0 10px rgba(0,0,0,.08);
}

.excluir{
background:red;
margin-top:10px;
}

</style>

</head>

<body>

<div class="login" id="login">

<h2>Área Administrativa</h2>

<input
type="password"
id="senha"
placeholder="Digite a senha">

<button onclick="entrar()">
Entrar
</button>

</div>

<div id="painel">

<h1>Toda Bella Studio</h1>

<h3 id="total"></h3>

<div id="lista"></div>

</div>

<script type="module" src="admin.js"></script>

</body>
</html>
